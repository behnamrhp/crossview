name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'public/**'
      - 'config/**'
      - 'index.html'
      - 'vite.config.*'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc.cjs'
      - 'crossview-go-server/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'config/**'
      - 'index.html'
      - 'vite.config.*'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc.cjs'
      - 'crossview-go-server/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go test
        working-directory: crossview-go-server
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu || true

      - name: Build
        run: npm run build
